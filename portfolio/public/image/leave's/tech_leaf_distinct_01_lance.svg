<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Distinct technology leaf 1</title>
  <desc id="desc">A transparent-background SVG technology leaf with a unique silhouette, geometric facets, and circuit-like veins. Right-side dot nodes are removed.</desc>
  <defs>
    <linearGradient id="body-v1" x1="180" y1="590" x2="1020" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e3b32"/>
      <stop offset="0.38" stop-color="#1d7556"/>
      <stop offset="0.72" stop-color="#78a96d"/>
      <stop offset="1" stop-color="#dec778"/>
    </linearGradient>
    <linearGradient id="edge-v1" x1="200" y1="585" x2="1000" y2="220" gradientUnits="userSpaceOnUse">
